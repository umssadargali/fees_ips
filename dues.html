<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; --green: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1.5fr 1fr 0.5fr; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 12px; border-radius: 8px; font-weight: bold; border: 2px solid #ddd; outline: none; }
        input:focus { border-color: var(--p); }
        .btn-fetch { background: var(--p); color: white; border: none; cursor: pointer; }
        .btn-all { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 15px; display: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #555; }
        .total-price { color: #d32f2f; font-weight: 700; font-size: 14px; }
        .details { font-size: 10px; color: #777; line-height: 1.2; }
        .wa-btn { background: #25D366; border: none; color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--p);">IQRA PUBLIC SCHOOL</h2>
        <p style="margin:0; font-size:12px;">Dues Management - Professional Portal</p>
    </div>

    <div class="controls">
        <input type="text" id="class_filter" placeholder="Type Class (e.g. 7 or prep)..." oninput="filterTable()">
        
        <select id="sel_month">
            <option value="">-- Select Month --</option>
            <option>January</option><option>February</option><option>March</option><option>April</option>
            <option>May</option><option>June</option><option>July</option><option>August</option>
            <option>September</option><option>October</option><option>November</option><option>December</option>
        </select>
        <button class="btn-fetch" onclick="loadEverything()">🔍 LOAD</button>
    </div>

    <button id="send-all-btn" class="btn-all" onclick="sendToAll()">📤 SEND REMINDERS TO FILTERED LIST</button>
    <div id="list-container"></div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyTiz7_zict19-FVlQjDOVef9qxraQaSU8QFx2l9RjcAFLmwuKYMGJZ132B9Ul7aCiS/exec";
    let allFetchedData = []; 
    let feesStructure = {};

    window.onload = async () => {
        let res = await fetch(URL + "?action=getFees");
        feesStructure = await res.json();
    };

    async function loadEverything() {
        let month = document.getElementById('sel_month').value;
        if(!month) return Swal.fire('Error', 'Pehle Month select karein', 'warning');
        
        let container = document.getElementById('list-container');
        container.innerHTML = "<p style='text-align:center;'>Fetching Records...</p>";
        document.getElementById('send-all-btn').style.display = "none";
        allFetchedData = [];

        try {
            let res = await fetch(URL + "?action=getReportData&month=" + month);
            let data = await res.json();
            
            if(data.rows && data.rows.length > 0) {
                allFetchedData = data.rows;
                filterTable(); // Naya filter call
            } else {
                container.innerHTML = "<p style='text-align:center; color:red; margin-top:20px;'>❌ No pending dues found.</p>";
            }
        } catch(e) { 
            container.innerHTML = "<p style='text-align:center; color:red;'>Data load nahi ho saka.</p>"; 
        }
    }

    function filterTable() {
        let container = document.getElementById('list-container');
        let filterText = document.getElementById('class_filter').value.toLowerCase();
        let currentMonth = document.getElementById('sel_month').value;

        if (allFetchedData.length === 0) return;

        let html = `<table><thead><tr><th>Student</th><th>Calculation</th><th>Total</th><th>WA</th></tr></thead><tbody>`;
        let count = 0;

        allFetchedData.forEach(r => {
            // Live Search Filter
            let studentClass = String(r.class).toLowerCase();
            let studentName = String(r.name).toLowerCase();
            if (filterText && !studentClass.includes(filterText) && !studentName.includes(filterText)) return;

            let oldDue = parseFloat(r.bal) || 0;
            let mFee = feesStructure[r.class] || 0;
            let total = oldDue + mFee;

            if(total > 0) {
                count++;
                html += `<tr>
                    <td><b>${r.name}</b><br><small>Class: ${r.class}</small></td>
                    <td class="details">Old: ₹${oldDue}<br>New (${currentMonth}): ₹${mFee}</td>
                    <td class="total-price">₹${total}</td>
                    <td>
                        <button class="wa-btn" onclick="sendMsg('${r.name}', ${total}, ${oldDue}, ${mFee})">
                            <svg viewBox="0 0 448 512" width="18" fill="white"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.6-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.6-6.5 8.3-9.8 2.8-3.3 3.7-5.6 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.5 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                        </button>
                    </td>
                </tr>`;
            }
        });

        container.innerHTML = (count > 0) ? html + "</tbody></table>" : "<p style='text-align:center; color:red; margin-top:20px;'>❌ No pending dues found.</p>";
        let sendBtn = document.getElementById('send-all-btn');
        sendBtn.style.display = (count > 0) ? "block" : "none";
        sendBtn.innerText = `📤 SEND REMINDERS TO ALL (${count})`;
    }

    function sendMsg(name, total, old, current) {
        let month = document.getElementById('sel_month').value;
        let text = `*IQRA PUBLIC SCHOOL - FEES REMINDER*\n\nDear Parent, Student *${name}* ka fees details:\n- Previous Due: ₹${old}\n- Fee (${month}): ₹${current}\n--------------------\n*TOTAL PAYABLE: ₹${total}*\n--------------------\nKripya ise jald jama karein.\n\nThank you!`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    async function sendToAll() {
        let filterText = document.getElementById('class_filter').value.toLowerCase();
        let visibleRows = allFetchedData.filter(r => 
            String(r.class).toLowerCase().includes(filterText) || 
            String(r.name).toLowerCase().includes(filterText)
        );
        
        Swal.fire('Bulk Start', `${visibleRows.length} messages process ho rahe hain...`, 'info');
        for (let i = 0; i < visibleRows.length; i++) {
            let r = visibleRows[i];
            let oldDue = parseFloat(r.bal) || 0;
            let mFee = feesStructure[r.class] || 0;
            if(oldDue + mFee > 0) {
                sendMsg(r.name, (oldDue + mFee), oldDue, mFee);
                await new Promise(r => setTimeout(r, 1800)); 
            }
        }
    }
</script>
</body>
</html>
